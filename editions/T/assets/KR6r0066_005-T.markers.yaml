  - {type: variant, offset: 4285, length: 135, content: 弘贊法華傳者。宋人永蘇景。依予之勸。且自高麗國所奉渡聖教百餘卷內也。依一本書。為恐散失勸俊源法師。先乞書寫一本矣。就中蘇景等歸朝之間。於壹岐島。遇海賊亂起。此傳上五卷入海中少濕損。雖然海賊等或為宋人被殺害。或及島被溺死。敢見散失物。宋人等云。偏依聖教之威力也云云保安元年七月五日。於太宰府記之。大法師覺樹, 甲: ''}
